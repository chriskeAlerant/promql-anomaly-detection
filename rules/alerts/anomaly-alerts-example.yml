groups:
  - name: AnomalyAdaptiveAlerts
    rules:
      - alert: AnomalyDetected
        for: 5m
        expr: >
          last_over_time(anomaly:level[2m]) < last_over_time(anomaly:lower_band{anomaly_strategy="adaptive"}[2m])
          or
          last_over_time(anomaly:level[2m]) > last_over_time(anomaly:upper_band{anomaly_strategy="adaptive"}[2m])
        labels:
          severity: warning
          anomaly_strategy: adaptive

  - name: AnomalyRobustAlerts
    rules:
      - alert: AnomalyDetected
        for: 5m
        expr: >
          last_over_time(anomaly:level[2m]) < last_over_time(anomaly:lower_band{anomaly_strategy="robust"}[2m])
          or
          last_over_time(anomaly:level[2m]) > last_over_time(anomaly:upper_band{anomaly_strategy="robust"}[2m])
        labels:
          severity: warning
          anomaly_strategy: robust
