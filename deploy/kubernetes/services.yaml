apiVersion: v1
kind: Service
metadata:
  name: anomaly-prometheus-a
spec:
  selector:
    app: anomaly-prometheus
    replica: anomaly-prometheus-a
  ports:
    - name: web
      port: 9090
      targetPort: web
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-prometheus-a-sidecar
spec:
  selector:
    app: anomaly-prometheus
    replica: anomaly-prometheus-a
  ports:
    - name: grpc
      port: 10901
      targetPort: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-prometheus-b
spec:
  selector:
    app: anomaly-prometheus
    replica: anomaly-prometheus-b
  ports:
    - name: web
      port: 9090
      targetPort: web
---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-prometheus-b-sidecar
spec:
  selector:
    app: anomaly-prometheus
    replica: anomaly-prometheus-b
  ports:
    - name: grpc
      port: 10901
      targetPort: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: thanos-query
spec:
  selector:
    app: thanos-query
  ports:
    - name: http
      port: 10902
      targetPort: http
    - name: grpc
      port: 10901
      targetPort: grpc
